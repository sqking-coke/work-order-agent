server:
  port: 8080

spring:
  application:
    name: work-order-agent

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/work_order_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.workorder.agent.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# =============================================
# 大模型配置（兼容 OpenAI 格式接口）
# 支持：DeepSeek / 通义千问 / Qwen / 星火 / 任意兼容接口
# =============================================
llm:
  # 是否启用 LLM，配置 api-key 后改为 true
  enabled: true
  # API 地址（OpenAI 兼容格式）
  api-url: https://api.deepseek.com/v1/chat/completions
  # API Key
  api-key: sk-50faea90be974ca0a7b92eaf970ead14
  # 模型名称
  model: deepseek-v4-flash
  # 连接超时（秒）
  connect-timeout: 10
  # 读取超时（秒）
  read-timeout: 60
  # 最大 Token 数
  max-tokens: 2048
  # 生成温度 0-2，越低越确定
  temperature: 0.3
  # 失败最大重试次数
  max-retries: 2
  # 重试间隔（毫秒）
  retry-delay-ms: 1000

# =============================================
# 智能工单 Agent 线程池配置
# =============================================
agent:
  thread-pool:
    core-size: 4
    max-size: 8
    queue-capacity: 200
    keep-alive-seconds: 60
    await-termination-seconds: 30

  # 定时任务配置
  task:
    # 超时巡检 cron（每5分钟）
    timeout-cron: "0 */5 * * * ?"
    # 每日复盘 cron（每天18:00）
    daily-report-cron: "0 0 18 * * ?"
    # 每周复盘 cron（每周一09:00）
    weekly-report-cron: "0 0 9 * * MON"
    # 超时阈值（小时）
    timeout-hours: 4

  # RAG 知识库配置
  rag:
    # 召回知识点数量
    top-k: 5
    # 相似度阈值（低于此值走人工）
    similarity-threshold: 0.3

  # 重复工单检测
  duplicate:
    # 相似度阈值（0-1，超过视为重复）
    threshold: 0.75

  # 兜底分派配置（无匹配部门时使用）
  fallback-assign:
    dept-name: "客服部"
    handler-user-id: 1002
    handler-user-name: "李四"

# 日志配置
logging:
  level:
    com.workorder.agent: DEBUG
    com.workorder.agent.mapper: INFO
